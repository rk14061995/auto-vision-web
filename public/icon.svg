<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="168" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lens" cx="256" cy="165" r="62" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Soft glow behind the eye -->
  <circle cx="256" cy="168" r="130" fill="url(#glow)"/>

  <!-- V-shape road / chevron (two converging strokes) -->
  <line x1="88"  y1="464" x2="256" y2="162" stroke="white" stroke-width="44" stroke-linecap="round"/>
  <line x1="424" y1="464" x2="256" y2="162" stroke="white" stroke-width="44" stroke-linecap="round"/>

  <!-- Road base connector -->
  <line x1="88" y1="464" x2="424" y2="464" stroke="white" stroke-width="28" stroke-linecap="round" opacity="0.25"/>

  <!-- AI vision eye at apex -->
  <circle cx="256" cy="162" r="62" fill="url(#lens)"/>
  <circle cx="256" cy="162" r="30" fill="white" opacity="0.96"/>
  <circle cx="256" cy="162" r="14" fill="#1d4ed8"/>
  <!-- Pupil highlight -->
  <circle cx="264" cy="154" r="5"  fill="white" opacity="0.75"/>
</svg>
